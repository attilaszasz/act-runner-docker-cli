name: Sync with upstream runner releases

on:
  schedule:
    # Check daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve latest upstream release
        id: upstream
        run: |
          set -euo pipefail

          body_file="$(mktemp)"

          cleanup() {
            rm -f "$body_file"
          }
          trap cleanup EXIT

          # Primary source: Docker Hub API (no auth needed, widely accessible)
          docker_hub_url="https://hub.docker.com/v2/repositories/gitea/runner/tags?page_size=100"

          echo "Fetching tags from Docker Hub..."
          status=$(curl \
            --silent \
            --show-error \
            --location \
            --retry 3 \
            --retry-all-errors \
            --retry-delay 5 \
            --connect-timeout 10 \
            --max-time 60 \
            --header 'Accept: application/json' \
            --output "$body_file" \
            --write-out '%{http_code}' \
            "$docker_hub_url") || status="FAIL"

          latest_tag=""

          if [ "$status" = "200" ]; then
            latest_version=$(jq -r '
              [.results[] | select(.name | test("^[0-9]+\\.[0-9]+\\.[0-9]+$")) | .name]
              | sort_by(. | split(".") | map(tonumber))
              | last // empty
            ' "$body_file" 2>/dev/null) || latest_version=""

            if [ -n "$latest_version" ]; then
              latest_tag="v${latest_version}"
              echo "Resolved from Docker Hub: $latest_tag"
            else
              echo "Docker Hub response was valid but no semver tags found"
            fi
          else
            echo "Docker Hub API returned HTTP $status"
          fi

          # Fallback: Gitea API
          if [ -z "$latest_tag" ]; then
            releases_url="https://gitea.com/api/v1/repos/gitea/runner/releases?limit=20"

            echo "Falling back to Gitea releases API..."
            status=$(curl \
              --silent \
              --show-error \
              --location \
              --retry 3 \
              --retry-all-errors \
              --retry-delay 5 \
              --connect-timeout 10 \
              --max-time 60 \
              --header 'Accept: application/json' \
              --output "$body_file" \
              --write-out '%{http_code}' \
              "$releases_url") || status="FAIL"

            if [ "$status" = "200" ]; then
              latest_tag=$(jq -r '
                map(select(
                  .draft == false and
                  .prerelease == false and
                  (.tag_name // "") != ""
                ))
                | sort_by(.published_at // .created_at // "")
                | if length > 0 then .[-1].tag_name else empty end
              ' "$body_file" 2>/dev/null) || latest_tag=""

              if [ -n "$latest_tag" ]; then
                echo "Resolved from Gitea API: $latest_tag"
              else
                echo "Gitea API response was valid but no stable release found"
              fi
            else
              echo "Gitea API returned HTTP $status"
            fi
          fi

          if [ -z "$latest_tag" ]; then
            echo "Error: Failed to resolve latest stable release tag"
            echo "Tried:"
            echo "  - Docker Hub API: $docker_hub_url"
            echo "  - Gitea API: https://gitea.com/api/v1/repos/gitea/runner/releases?limit=20"
            exit 1
          fi

          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"
          echo "Latest upstream tag: $latest_tag"

      - name: Read current version
        id: current
        run: |
          if [ -f UPSTREAM_VERSION ]; then
            CURRENT_VERSION=$(cat UPSTREAM_VERSION)
          else
            CURRENT_VERSION="none"
          fi
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current tracked version: $CURRENT_VERSION"

      - name: Check if update needed
        id: check
        run: |
          if [ "${{ steps.current.outputs.current_version }}" = "${{ steps.upstream.outputs.latest_tag }}" ]; then
            echo "needs_update=false" >> $GITHUB_OUTPUT
            echo "No update needed - already at latest version"
          else
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "Update needed: ${{ steps.current.outputs.current_version }} -> ${{ steps.upstream.outputs.latest_tag }}"
          fi

      - name: Update Dockerfile
        if: steps.check.outputs.needs_update == 'true'
        run: |
          # Extract version without 'v' prefix
          VERSION="${{ steps.upstream.outputs.latest_tag }}"
          
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "Error: Invalid version: $VERSION"
            exit 1
          fi
          
          VERSION_NUMBER="${VERSION#v}"
          
          # Update the FROM line in Dockerfile
          sed -i "s|^FROM gitea/runner:.*|FROM gitea/runner:${VERSION_NUMBER}|" Dockerfile
          
          # Verify the update
          grep "FROM gitea/runner" Dockerfile
          echo "Updated Dockerfile to use runner:${VERSION_NUMBER}"

      - name: Install cosign
        if: steps.check.outputs.needs_update == 'true'
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 #v3.5.0
        with:
          cosign-release: 'v2.2.4'

      - name: Set up Docker Buildx
        if: steps.check.outputs.needs_update == 'true'
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0

      - name: Log into registry ${{ env.REGISTRY }}
        if: steps.check.outputs.needs_update == 'true'
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        if: steps.check.outputs.needs_update == 'true'
        id: meta
        uses: docker/metadata-action@96383f45573cb7f253c731d3b3ab81c87ef81934 # v5.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.upstream.outputs.latest_tag }}
            type=raw,value=latest

      - name: Build and push Docker image
        if: steps.check.outputs.needs_update == 'true'
        id: build-and-push
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09 # v5.0.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign the published Docker image
        if: steps.check.outputs.needs_update == 'true'
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

      - name: Update version tracking files
        if: steps.check.outputs.needs_update == 'true'
        run: |
          set -euo pipefail

          # Update UPSTREAM_VERSION file
          VERSION="${{ steps.upstream.outputs.latest_tag }}"
          VERSION_NUMBER="${VERSION#v}"
          
          echo "$VERSION" > UPSTREAM_VERSION
          
          # Update README with the tracked base image version without touching sample volume paths.
          awk -v version="$VERSION" -v version_number="$VERSION_NUMBER" '
            /^- \*\*Base Image\*\*: \[`gitea\/runner:/ {
              print "- **Base Image**: [`gitea/runner:" version_number "`](https://gitea.com/gitea/runner/releases/tag/" version ")"
              next
            }
            /^      - \.\/gitea\/runner:[0-9.]+\/data$/ || /^      - \.\/runner-data:\/data$/ {
              print "      - ./runner-data:/data"
              next
            }
            { print }
          ' README.md > README.md.tmp
          mv README.md.tmp README.md
          
          echo "Updated version tracking files to $VERSION (${VERSION_NUMBER})"

      - name: Commit and push changes
        if: steps.check.outputs.needs_update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Dockerfile UPSTREAM_VERSION README.md
          git commit -m "chore: update to runner ${{ steps.upstream.outputs.latest_tag }}"
          git push

      - name: Create release tag
        if: steps.check.outputs.needs_update == 'true'
        run: |
          git tag "${{ steps.upstream.outputs.latest_tag }}"
          git push origin "${{ steps.upstream.outputs.latest_tag }}"
